name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: typecheck + build + fast tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - name: Verify committed web bundles are up to date
        run: |
          git diff --exit-code -- src/web/widget.mjs src/web/live-card.js \
            || (echo "::error::Committed web bundles are stale — run 'npm run build:web' and commit." && exit 1)

  e2e:
    name: real-browser e2e (headless Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Golden e2e (launches a local Chromium)
        run: npm run test:e2e
